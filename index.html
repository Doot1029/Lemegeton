<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PSone.css -->
    <link rel="stylesheet" href="PSone.css/PSone.min.css">
    <style>
        @font-face {
            font-family: 'dungeon mode';
            src: url('Fonts/dungeon-mode.ttf');
        }
        @font-face {
            font-family: 'silver';
            src: url('Fonts/Silver.ttf');
        }
        @font-face {
            font-family: 'infernal script';
            src: url('InfernalScript.ttf');
        }
        @font-face {
            font-family: 'chunky';
            src: url('Fonts/CHUNKY.ttf');
        }
        @font-face {
            font-family: 'cp437';
            src: url('Fonts/cp437-12x24.otf');
        }
        @font-face {
            font-family: 'ursafont';
            src: url('Fonts/UrsaFont.ttf');
        }
        @font-face {
            font-family: 'ursafont-ansi';
            src: url('Fonts/UrsaFont ANSI.ttf');
        }
        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #ffb000;
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
            cursor: auto;
        }
        /* Style Lore terminal to fit inside PSone container */
        .lore-terminal {
            background: transparent !important;
            color: #ffb000 !important;
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor !important;
            box-shadow: none !important;
            padding: 20px !important;
            width: 100% !important;
            height: 100% !important;
            position: relative !important;
            display: flex !important;
            flex-direction: column !important;
            font-family: 'silver', sans-serif !important;
            font-size: 2.5rem !important;
            border: none !important;
            border-radius: 0;
            overflow: hidden !important;
            box-sizing: border-box !important;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
            image-rendering: pixelated;  
        }
        
        /* Menu Screen Styles */
        #menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(#a20000, #262626);
            z-index: 10001;
            padding: 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'silver', sans-serif;
            color: #ffb000;
            cursor: none !important;
        }

        .menu-header {
            font-family: 'dungeon mode';
            font-size: 3rem;
            margin-bottom: 30px;
            color: #ffb000;
            text-transform: uppercase;
            padding-left: 20px;
        }

        .menu-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .menu-list::-webkit-scrollbar {
            display: none;
        }

        .menu-item {
            display: grid;
            grid-template-columns: 50px 1fr 150px 200px;
            padding: 2px 20px;
            font-size: 2.5rem;
            margin: 2px 0;
            line-height: 1.2;
            text-transform: lowercase;
        }

        .menu-item.selected {
            background-color: #ffb000;
            color: #a20000; /* Red from gradient */
            text-shadow: none !important;
        }

        .menu-item.selected span {
            color: inherit !important;
            text-shadow: none !important;
        }

        .menu-footer {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            font-size: 2rem;
            padding-left: 20px;
        }

        .footer-key {
            background: #ffb000;
            color: #a20000;
            padding: 0 10px;
            border-radius: 4px;
            margin-right: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Ensure no cursor showing on inputs in menu or elsewhere if needed */
        .lore-input {
            caret-color: transparent !important;
        }
        /* Ensure all spans inside terminal also glow with their color */
        .lore-terminal span {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor !important;
        }
        .lore-output {
            flex: 1 !important;
            height: auto !important;
            line-height: 1.2;
            overflow-y: auto !important;
            margin-bottom: 10px !important;
            white-space: normal !important;
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }
        .lore-output::-webkit-scrollbar {
            display: none !important;
        }
        .lore-input-container {
            display: flex !important;
            align-items: center !important;
            flex-shrink: 0 !important;
        }
        .lore-input {
            font-family: 'silver', sans-serif !important;
            color: #ffb000 !important;
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            font-size: 2.5rem !important;
            cursor: url('text-cursor.png'), auto !important;
            user-select: text !important;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
            flex: 1 !important;
        }
        .graphics-window {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(#a20000, #262626);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: row;
            cursor: url('cursor.png'), auto;
            box-sizing: border-box;
            overflow: hidden;
            margin: 0;
            border: none;
            border-radius: 0;
        }
        .vertical-line {
            width: 3px;
            background-color: rgba(255, 255, 255, 0.3);
            height: 100%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        #terminal-window {
            flex: 1;
            height: 100%;
            position: relative;
        }


        #info-panel {
            width: 400px;
            height: 100%;
            padding: 60px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #info-panel::-webkit-scrollbar {
            display: none;
        }
        .info-title {
            font-family: 'dungeon mode';
            color: #ffb000;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
        }
        .info-content {
            font-family: 'silver';
            color: #ffb000;
            font-size: 1.8rem;
            line-height: 1.4;
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
        }
        .text-cursor {
            cursor: text !important;
        }
        .select-cursor {
            cursor: default !important;
            user-select: text;
        }
        /* Make Dungeon Mode larger */
        span[style*="dungeon mode"] {
            font-size: 0.5em;
        }

        .retro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('retroarch_overlay_dotmatrix_1280x720.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.8; /* Adjust as needed */
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            body {
                height: 100vh;
                overflow: hidden;
            }
            .graphics-window {
                flex-direction: column;
                height: 100vh;
                width: 100vw;
            }
            #terminal-window {
                height: 60vh;
                width: 100%;
            }
            .vertical-line {
                width: 100%;
                height: 2px;
                background-color: rgba(255, 255, 255, 0.2);
            }
            #info-panel {
                width: 100%;
                flex: 1;
                padding: 20px;
                border-left: none;
                border-top: 2px solid rgba(255, 255, 255, 0.2);
            }
            .lore-terminal, .lore-input {
                font-size: 1.8rem !important;
                padding: 10px !important;
            }
            .info-title {
                font-size: 1.5rem;
            }
            .info-content {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body class="mode-text">
  <div id="menu-screen">
    <div class="menu-header">TEXT ADVENTURE GAME SELECTION</div>
    <div class="menu-list" id="menu-list">
        <!-- Menu items will be injected here -->
    </div>
    <div class="menu-footer">
        <div><span class="footer-key">↑↓</span> navigate</div>
        <div><span class="footer-key">enter</span> play</div>
    </div>
  </div>
  <aside class="graphics-window hidden">
    <div id="game-main" style="flex: 1; display: flex; flex-direction: column; height: 100%;">
        <div id="terminal-window" style="flex: 1;"></div>
    </div>
    <div class="vertical-line"></div>
    <div id="info-panel">
        <div class="info-title">Lemegeton</div>
        <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 10px 0;">
        <div class="info-content">
            <p>Subject: Lemegeton</p>
            <p>Status: <span id="connection-status" style="color: #ffb000; text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;">Connecting...</span></p>
            <p>Session: <span id="session-code" style="color: #ffb000;">------</span></p>
            <p>Privacy: <span id="privacy-status" style="color: #ffb000;">Private</span></p>
            <p style="margin-top: 20px; font-size: 1.4rem; color: #ffb000; text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;">
                "The split between worlds is but a thin line."
            </p>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="node_modules/lorejs/lore.js"></script>
    <script src="clavicula.js"></script>
    <script src="lemegeton.js"></script>
    <script>
      let socket;
      try {
        socket = io();
        setupSocketEvents();
      } catch (e) {
        console.warn("Socket.io not found, attempting to connect to localhost:3000");
        // Fallback for when opening as a file
        const script = document.createElement('script');
        script.src = 'http://localhost:3000/socket.io/socket.io.js';
        script.onload = () => { 
          socket = io('http://localhost:3000'); 
          setupSocketEvents(); 
          console.log("Connected to fallback socket server");
        };
        document.head.appendChild(script);
      }
      
      const game = new LORE.Game({
        typingSpeed: 20
      });
      const menuScreen = document.getElementById('menu-screen');
      const gameScreen = document.querySelector('.graphics-window');
      const menuList = document.getElementById('menu-list');
      const sessionCodeDisplay = document.getElementById('session-code');
      const privacyStatusDisplay = document.getElementById('privacy-status');
      const connectionStatusDisplay = document.getElementById('connection-status');

      document.querySelector('.menu-header').textContent = "Devilish Desires";

      let selectedIndex = 0;
      let saveSlots = [];
      let currentSession = null;

      function normalizeMUDQuery(value) {
        return String(value || '')
          .toLowerCase()
          .replace(/\s+/g, ' ')
          .trim();
      }

      function ensureGameFlags() {
        if (!game.state.flags) {
          game.state.flags = {};
        }
      }

      function setMultiplayerPlayers(players) {
        const dedupedPlayers = [];
        const seen = new Set();

        (players || []).forEach((player) => {
          if (!player || seen.has(player.id)) {
            return;
          }
          seen.add(player.id);
          dedupedPlayers.push(player);
        });

        game.state.multiplayerPlayers = dedupedPlayers;
      }

      function upsertMultiplayerPlayer(player) {
        if (!player) {
          return;
        }

        const players = Array.isArray(game.state.multiplayerPlayers) ? [...game.state.multiplayerPlayers] : [];
        const existingIndex = players.findIndex((entry) => entry.id === player.id);
        if (existingIndex === -1) {
          players.push(player);
        } else {
          players[existingIndex] = { ...players[existingIndex], ...player };
        }

        setMultiplayerPlayers(players);
      }

      function removeMultiplayerPlayer(playerId) {
        if (!Array.isArray(game.state.multiplayerPlayers)) {
          return;
        }

        setMultiplayerPlayers(game.state.multiplayerPlayers.filter((player) => player.id !== playerId));
      }

      function describeRemoteAction(playerName, action) {
        const trimmedAction = String(action || '').trim();
        const normalizedAction = normalizeMUDQuery(trimmedAction);
        const movementDirections = {
          n: 'north',
          s: 'south',
          e: 'east',
          w: 'west',
          ne: 'northeast',
          nw: 'northwest',
          se: 'southeast',
          sw: 'southwest',
          u: 'up',
          d: 'down',
          i: 'in',
          o: 'out'
        };

        if (!trimmedAction) {
          return `{{italic}}${playerName} shifts in the dark.{{font_reset}}`;
        }

        const movement = normalizedAction.startsWith('go ')
          ? normalizedAction.slice(3)
          : movementDirections[normalizedAction] || normalizedAction;
        const cardinalDirections = [
          'north', 'south', 'east', 'west',
          'northeast', 'northwest', 'southeast', 'southwest',
          'up', 'down', 'in', 'out'
        ];

        if (cardinalDirections.includes(movement)) {
          return `{{italic}}${playerName} heads ${movement}.{{font_reset}}`;
        }
        if (normalizedAction === 'look') {
          return `{{italic}}${playerName} studies the surroundings.{{font_reset}}`;
        }
        if (normalizedAction.startsWith('talk ')) {
          const [, rest] = trimmedAction.split(/talk\s+/i);
          return `{{italic}}${playerName} tries to strike up a conversation about ${rest || 'something unsettling'}.{{font_reset}}`;
        }
        if (normalizedAction.startsWith('say ')) {
          return `{{italic}}${playerName} says, "${trimmedAction.slice(4)}"{{font_reset}}`;
        }
        if (normalizedAction.startsWith('follow ')) {
          return `{{italic}}${playerName} falls in behind ${trimmedAction.slice(7)}.{{font_reset}}`;
        }
        if (normalizedAction.startsWith('take ')) {
          return `{{italic}}${playerName} picks up ${trimmedAction.slice(5)}.{{font_reset}}`;
        }
        if (normalizedAction.startsWith('drop ')) {
          return `{{italic}}${playerName} drops ${trimmedAction.slice(5)}.{{font_reset}}`;
        }
        if (normalizedAction.startsWith('use ')) {
          return `{{italic}}${playerName} uses ${trimmedAction.slice(4)}.{{font_reset}}`;
        }
        if (normalizedAction.startsWith('read ')) {
          return `{{italic}}${playerName} pores over ${trimmedAction.slice(5)}.{{font_reset}}`;
        }
        if (normalizedAction === 'sleep') {
          return `{{italic}}${playerName} settles down to sleep.{{font_reset}}`;
        }

        return `{{italic}}${playerName} ${trimmedAction}.{{font_reset}}`;
      }

      function refreshSaves() {
        let saves = {};
        try {
          saves = JSON.parse(localStorage.getItem('lore_save_data') || "{}");
        } catch (e) {
          console.error("Error loading saves", e);
        }

        saveSlots = Object.keys(saves).map(slot => {
          const isMUD = slot.startsWith('MUD_');
          return {
            id: slot,
            title: isMUD ? `MUD Save: ${slot.replace('MUD_', '')}` : `Local Save: ${slot}`,
            time: new Date(saves[slot].timestamp).toLocaleTimeString(),
            date: new Date(saves[slot].timestamp).toLocaleDateString(),
            author: isMUD ? 'MUD' : 'Local',
            type: isMUD ? 'mud' : 'local'
          };
        });

        // Add "New Game" option
        saveSlots.unshift({ id: 'new_game', title: 'Start New Game', time: '-', date: '-', author: 'Lemegeton' });
      }

      function renderMenu() {
        menuList.innerHTML = saveSlots.map((slot, index) => `
          <div class="menu-item ${index === selectedIndex ? 'selected' : ''}">
            <span class="item-number">${index + 1}</span>
            <span class="item-title">${slot.title}</span>
            <span class="item-time">${slot.time}</span>
            <span class="item-author">${slot.author}</span>
          </div>
        `).join('');
      }

      function handleKeyDown(e) {
        if (!menuScreen.classList.contains('hidden')) {
          if (e.key === 'ArrowDown') {
            selectedIndex = (selectedIndex + 1) % saveSlots.length;
            renderMenu();
            e.preventDefault();
          } else if (e.key === 'ArrowUp') {
            selectedIndex = (selectedIndex - 1 + saveSlots.length) % saveSlots.length;
            renderMenu();
            e.preventDefault();
          } else if (e.key === 'Enter') {
            startGame(saveSlots[selectedIndex]);
            e.preventDefault();
          }
        }
      }

      async function startGame(slotInfo) {
        console.log("Starting game with slot:", slotInfo);
        if (!window.LemegetonNovel) {
          console.error("LemegetonNovel not found!");
          return;
        }
        await setupMUDCommands();

        // Create session immediately
        if (socket) {
          if (slotInfo.id === 'new_game') {
            socket.emit('create_session', { name: "Adventurer" });
          } else {
            socket.emit('create_session', { name: "Adventurer", gameState: {} }); 
          }
        }

        menuScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        game.inputElement.focus();
        
        if (slotInfo.id !== 'new_game') {
          game.state.flags.loadingSave = true;
          await game.loadNovel(window.LemegetonNovel);
          if (typeof window.registerLemegetonExtensions === 'function') {
            await window.registerLemegetonExtensions(game);
          }
          game.state.flags.loadingSave = false;
          game.loadGame(slotInfo.id);
        } else {
          game.config.clearScreenOnNovelLoad = false;
          game.clearScreen();
          await game.loadNovel(window.LemegetonNovel);
          console.log("Intro text:", window.LemegetonNovel.introText);
          await game.printLine("{{instant}}" + window.LemegetonNovel.introText + "{{/instant}}");
          if (typeof window.registerLemegetonExtensions === 'function') {
            await window.registerLemegetonExtensions(game);
          }
          
          // Autosaves
          const timestamp = Date.now();
          const localSlot = `autosave_${timestamp}`;
          const mudSlot = `MUD_autosave_${timestamp}`;
          game.saveGame(localSlot);
          game.saveGame(mudSlot);
        }
      }

      async function setupMUDCommands() {
        await game.loadPlugin({
          id: "mud_commands",
          commands: [
            {
              name: "join",
              help: "Join a MUD session. Use 'join random' or 'join [code]'.",
              fn: (args, engine) => {
                if (args.length === 0) {
                  engine.printLine("Join what? Use 'join random' or 'join [code]'.");
                  return true;
                }
                const target = args[0].toLowerCase();
                if (socket) {
                  if (target === 'random') {
                    socket.emit('join_random', { name: "Adventurer" });
                  } else {
                    socket.emit('join_session', { code: target, name: "Adventurer" });
                  }
                } else {
                  engine.printLine("Multiplayer unavailable: No connection to server.");
                }
                return true;
              }
            },
            {
              name: "public",
              help: "Toggle session privacy to public.",
              fn: (args, engine) => {
                if (socket) socket.emit('toggle_privacy');
                else engine.printLine("Multiplayer unavailable: No connection to server.");
                return true;
              }
            },
            {
              name: "private",
              help: "Toggle session privacy to private.",
              fn: (args, engine) => {
                if (socket) socket.emit('toggle_privacy');
                else engine.printLine("Multiplayer unavailable: No connection to server.");
                return true;
              }
            },
            {
              name: "code",
              help: "Show the current session code.",
              fn: (args, engine) => {
                if (currentSession) {
                  engine.printLine(`Current Session Code: {{bold}}{{yellow}}${currentSession.code}{{font_reset}}`);
                } else {
                  engine.printLine("Not in a session.");
                }
                return true;
              }
            },
            {
              name: "who",
              help: "Show players in the current session.",
              fn: (args, engine) => {
                if (game.state.multiplayerPlayers && game.state.multiplayerPlayers.length > 0) {
                  engine.printLine("{{bold}}Adventurers in this realm:{{font_reset}}");
                  game.state.multiplayerPlayers.forEach(p => {
                    engine.printLine(`- ${p.name} ${p.id === socket.id ? '(you)' : ''}`);
                  });
                } else {
                  engine.printLine("You are alone in this realm.");
                }
                return true;
              }
            }
          ]
        });

        // Intercept all commands to broadcast to MUD
        if (!game._processInputOverridden) {
          const originalProcessInput = game.processInput;
          game._originalProcessInput = originalProcessInput;
          game.processInput = function(input) {
            const result = originalProcessInput.call(this, input);
            if (!this._suppressMUDRelay && socket && currentSession && input.trim()) {
              socket.emit('game_action', { action: input });
            }
            return result;
          };
          game._processInputOverridden = true;
        }
      }

      // Socket Events
      function setupSocketEvents() {
        if (!socket) return;
        
        socket.on('connect', () => {
          connectionStatusDisplay.textContent = "Connected";
          connectionStatusDisplay.style.color = "#00ff00";
          game.state.multiplayerSelfId = socket.id;
        });

        socket.on('disconnect', () => {
          connectionStatusDisplay.textContent = "Disconnected";
          connectionStatusDisplay.style.color = "#ff0000";
        });

        socket.on('session_created', (data) => {
          currentSession = data;
          sessionCodeDisplay.textContent = data.code;
          privacyStatusDisplay.textContent = data.isPublic ? "Public" : "Private";
          game.state.multiplayerSelfId = socket.id;
          setMultiplayerPlayers([{ name: "Adventurer", id: socket.id }]);
          game.printLine(`{{cyan}}Session created! Code: {{bold}}${data.code}{{font_reset}}`);
        });

        socket.on('session_joined', (data) => {
          currentSession = data;
          sessionCodeDisplay.textContent = data.code;
          privacyStatusDisplay.textContent = data.isPublic ? "Public" : "Private";
          game.state.multiplayerSelfId = socket.id;
          setMultiplayerPlayers(data.players);
          game.clearScreen();
          game.printLine(`{{cyan}}Joined session: {{bold}}${data.code}{{font_reset}}`);
          game.printLine(`Players here: ${data.players.map(p => p.name).join(', ')}`);
        });

        socket.on('player_joined', (data) => {
          upsertMultiplayerPlayer(data);
          game.printLine(`{{yellow}}${data.name} has entered the world.{{font_reset}}`);
        });

        socket.on('player_left', (data) => {
          removeMultiplayerPlayer(data.id);
          ensureGameFlags();
          if (game.state.flags.following === data.id) {
            delete game.state.flags.following;
            game.printLine("{{yellow}}You lose track of the one you were following.{{font_reset}}");
          }
          game.printLine(`{{red}}Someone has left the world.{{font_reset}}`);
        });

        socket.on('player_action', (data) => {
          ensureGameFlags();
          game.printLine(describeRemoteAction(data.playerName, data.action));
          
          // Auto-follow logic
          const action = normalizeMUDQuery(data.action);
          const isMovement = action.startsWith('go ') || ['north', 'south', 'east', 'west', 'up', 'down', 'n', 's', 'e', 'w', 'u', 'd', 'ne', 'nw', 'se', 'sw', 'in', 'out'].includes(action);
          
          if (isMovement && (game.state.flags.following === data.playerId || normalizeMUDQuery(game.state.flags.following) === normalizeMUDQuery(data.playerName))) {
            setTimeout(() => {
              game._suppressMUDRelay = true;
              try {
                const processInput = game._originalProcessInput || game.processInput;
                processInput.call(game, data.action);
              } finally {
                game._suppressMUDRelay = false;
              }
            }, 500); // Small delay for "realism"
          }
        });

        socket.on('privacy_toggled', (data) => {
          if (currentSession) {
            currentSession.isPublic = data.isPublic;
            privacyStatusDisplay.textContent = data.isPublic ? "Public" : "Private";
            game.printLine(`Session is now {{bold}}${data.isPublic ? "PUBLIC" : "PRIVATE"}{{font_reset}}.`);
          }
        });

        socket.on('error', (data) => {
          game.printLine(`{{red}}Error: ${data.message}{{font_reset}}`);
        });
      }

      function attachTerminalToMount() {
        const terminal = document.querySelector('.lore-terminal');
        const mount = document.getElementById('terminal-window');
        if (terminal && mount) {
          mount.appendChild(terminal);
          terminal.style.position = 'relative';
          terminal.style.width = '100%';
          terminal.style.height = '100%';
          terminal.style.top = '0';
          terminal.style.left = '0';
        } else {
          setTimeout(attachTerminalToMount, 50);
        }
      }

      window.addEventListener('keydown', handleKeyDown);
      refreshSaves();
      renderMenu();
      attachTerminalToMount();
    </script>
  </aside>
</body>
</html>
